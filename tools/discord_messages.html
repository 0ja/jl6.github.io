<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCORD GEN | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { font-family: 'JetBrains+Mono', monospace; }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(16, 185, 129, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .terminal-grid {
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.03;
        }

        .preserve-3d { transform-style: preserve-3d; perspective: 1000px; }
        .inner-content { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Custom Input Styling */
        input, textarea, select {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 1px solid rgba(16, 185, 129, 0.2) !important;
            border-radius: 0px !important;
            color: white !important;
            font-size: 10px !important;
            padding: 12px !important;
            transition: all 0.3s ease !important;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none !important;
            border-color: rgba(16, 185, 129, 0.6) !important;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .hidden { display: none !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b981; }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-400">

    <div class="fixed inset-0 pointer-events-none">
        <div class="scanline"></div>
        <div class="absolute inset-0 terminal-grid"></div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-12 relative z-20">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8 border-b border-emerald-500/20 pb-12">
            <div>
                <a href="../index.html" class="text-[10px] font-bold text-emerald-500/60 uppercase tracking-[0.4em] hover:text-emerald-400 transition-all flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-chevron-left"></i> BACK
                </a>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-emerald-400 uppercase cursor-default">
                    DISCORD_<span class="text-white">GEN</span>
                </h1>
            </div>

            <div class="text-right">
                <button onclick="sendMessage()" class="bg-emerald-500 hover:bg-emerald-400 text-black font-black text-[10px] px-8 py-4 uppercase tracking-[0.2em] transition-all">
                    [ SEND ]
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT COLUMN: CONFIG -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">WEBHOOK</label>
                        <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." class="w-full mb-6">
                        
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">MESSAGE TYPE</label>
                        <select id="msgType" onchange="toggleMode()" class="w-full">
                            <option value="text">PLAIN TEXT (STANDARD)</option>
                            <option value="embed">RICH EMBED (ADVANCED)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: CONTENT EDITOR -->
            <div class="lg:col-span-8">
                
                <!-- TEXT SECTION -->
                <div id="textSection" class="bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">MESSAGE CONTENT</label>
                        <textarea id="content" rows="12" placeholder="Input raw message string..." class="w-full font-mono"></textarea>
                    </div>
                </div>

                <!-- EMBED SECTION -->
                <div id="embedSection" class="hidden bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                    <div class="inner-content grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">EMBED TITLE</label>
                            <input type="text" id="eTitle" placeholder="Heading" class="w-full">
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">VISUAL THEME</label>
                            <div class="flex items-center gap-4">
                                <input type="color" id="eColor" value="#10b981" class="!w-16 !h-10 cursor-pointer">
                                <label class="text-[9px] text-slate-500 flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" id="randomColor" class="!p-0"> RANDOMIZE
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">AUTHOR NAME</label>
                            <input type="text" id="eAuthor" placeholder="Display Name" class="w-full">
                        </div>

                        <div class="md:col-span-2">
                            <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">DESCRIPTION</label>
                            <textarea id="eDesc" rows="4" placeholder="Main embed content..." class="w-full"></textarea>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">THUMBNAIL URL</label>
                            <input type="url" id="eThumb" placeholder="https://image.path" class="w-full">
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">IMAGE URL</label>
                            <input type="url" id="eImage" placeholder="https://image.path" class="w-full">
                        </div>

                        <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-emerald-500/10">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">FOOTER TEXT</label>
                                <input type="text" id="eFooter" placeholder="System tag..." class="w-full">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">FOOTER ICON</label>
                                <input type="url" id="eFooterIcon" placeholder="https://image.path" class="w-full">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleMode() {
            const isEmbed = document.getElementById('msgType').value === 'embed';
            const embedSec = document.getElementById('embedSection');
            const textSec = document.getElementById('textSection');
            
            if (isEmbed) {
                embedSec.classList.remove('hidden');
                textSec.classList.add('hidden');
            } else {
                embedSec.classList.add('hidden');
                textSec.classList.remove('hidden');
            }
        }

        function clean(obj) {
            for (const key in obj) {
                if (obj[key] === null || obj[key] === undefined || obj[key] === "" || (typeof obj[key] === 'object' && Object.keys(obj[key]).length === 0)) {
                    delete obj[key];
                }
            }
            return Object.keys(obj).length === 0 ? null : obj;
        }

        async function sendMessage() {
            const url = document.getElementById('webhookUrl').value.trim();
            const type = document.getElementById('msgType').value;
            const isRandom = document.getElementById('randomColor').checked;
            const status = document.getElementById('statusDisplay');
            
            if (!url.startsWith('https://discord.com/api/webhooks/')) {
                status.innerText = "ERROR: INVALID_WEBHOOK_URL";
                status.style.color = "#ef4444";
                return;
            }

            let payload = {};

            if (type === 'text') {
                payload.content = document.getElementById('content').value;
                if (!payload.content.trim()) return alert("CONTENT_REQUIRED");
            } else {
                let colorDecimal = isRandom ? Math.floor(Math.random() * 16777215) : parseInt(document.getElementById('eColor').value.replace('#', ''), 16) || 0;

                const author = clean({
                    name: document.getElementById('eAuthor').value,
                    icon_url: document.getElementById('eAuthorIcon') ? document.getElementById('eAuthorIcon').value : "" 
                });

                const footer = clean({
                    text: document.getElementById('eFooter').value,
                    icon_url: document.getElementById('eFooterIcon').value
                });

                const embed = clean({
                    title: document.getElementById('eTitle').value || null,
                    description: document.getElementById('eDesc').value || null,
                    color: colorDecimal,
                    author: author,
                    footer: footer,
                    thumbnail: clean({ url: document.getElementById('eThumb').value }),
                    image: clean({ url: document.getElementById('eImage').value })
                });

                if (!embed) return alert("EMBED_PARAMETERS_REQUIRED");
                payload.embeds = [embed];
            }

            status.innerText = "TRANSMITTING...";
            status.style.color = "#10b981";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    status.innerText = "SUCCESS: PACKET_DELIVERED";
                } else {
                    const errorData = await response.json();
                    status.innerText = `FAIL: ${errorData.message.toUpperCase()}`;
                    status.style.color = "#ef4444";
                }
            } catch (err) {
                status.innerText = "CONNECTION_INTERRUPTED";
                status.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
