<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCORD GEN | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }
        
        /* Custom Modern Minimal Text Area fields */
        input[type="text"], input[type="url"], textarea, select {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid #18181b !important;
            border-radius: 0px !important;
            color: #e4e4e7 !important;
            font-size: 12px !important;
            padding: 10px 0px !important;
            transition: border-color 0.3s ease !important;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none !important;
            border-color: #52525b !important;
        }

        .hidden { display: none !important; }

        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-zinc-400 min-h-screen selection:bg-zinc-800 selection:text-white antialiased">

    <div class="max-w-5xl mx-auto px-8 py-20">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-24 gap-6">
            <div>
                <a href="../index.html" class="text-[10px] tracking-widest text-zinc-600 hover:text-zinc-400 transition-colors block mb-3">
                    [ back_to_index ]
                </a>
                <h1 class="text-2xl font-bold tracking-tight text-zinc-100">
                    discord_<span class="text-zinc-500 font-normal">gen</span>
                </h1>
            </div>

            <div class="flex flex-col sm:items-end gap-2">
                <button onclick="sendMessage()" class="text-[10px] text-zinc-500 hover:text-emerald-400 tracking-[0.4em] font-bold uppercase border border-zinc-900 px-8 py-3 transition-colors bg-zinc-950/20">
                    [ TRANSMIT ]
                </button>
                <div id="statusDisplay" class="text-[9px] tracking-widest uppercase font-bold text-zinc-700 h-4">
                    ready_state
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-4 space-y-12">
                
                <div class="space-y-3">
                    <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold block">Webhook Interface Link</label>
                    <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." class="w-full">
                </div>

                <div class="space-y-3 pt-6 border-t border-zinc-900">
                    <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold block">Payload Type</label>
                    <select id="msgType" onchange="toggleMode()" class="w-full cursor-pointer">
                        <option value="text">PLAIN STRING FORMAT (STANDARD)</option>
                        <option value="embed">RICH METADATA EMBED (ADVANCED)</option>
                    </select>
                </div>
                
            </div>

            <div class="lg:col-span-8">
                
                <div id="textSection" class="space-y-4">
                    <div class="border-b border-zinc-900 pb-2">
                        <span class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold">Message Block Payload</span>
                    </div>
                    <textarea id="content" rows="10" placeholder="Input structural string content..." class="w-full font-mono resize-none"></textarea>
                </div>

                <div id="embedSection" class="hidden space-y-10">
                    <div class="border-b border-zinc-900 pb-2">
                        <span class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold">Metadata Embed Matrix</span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[10px] text-zinc-500 uppercase tracking-wide block">Embed Title</label>
                            <input type="text" id="eTitle" placeholder="Data heading value" class="w-full">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] text-zinc-500 uppercase tracking-wide block">Visual Accent Theme</label>
                            <div class="flex items-center gap-4 py-2">
                                <input type="color" id="eColor" value="#10b981" class="w-12 h-6 cursor-pointer bg-transparent border-none">
                                <label class="text-[10px] text-zinc-600 flex items-center gap-2 cursor-pointer select-none">
                                    <input type="checkbox" id="randomColor" class="accent-emerald-500"> RANDOMIZE
                                </label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] text-zinc-500 uppercase tracking-wide block">Author Alias</label>
                            <input type="text" id="eAuthor" placeholder="System user tracking name" class="w-full">
                        </div>

                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[10px] text-zinc-500 uppercase tracking-wide block">Main Body Description</label>
                            <textarea id="eDesc" rows="4" placeholder="Inject core documentation content blocks..." class="w-full resize-none"></textarea>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] text-zinc-500 uppercase tracking-wide block">Thumbnail Asset Source URL</label>
                            <input type="url" id="eThumb" placeholder="https://resource.path/image.png" class="w-full">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] text-zinc-500 uppercase tracking-wide block">Hero Image Source URL</label>
                            <input type="url" id="eImage" placeholder="https://resource.path/banner.jpg" class="w-full">
                        </div>

                        <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8 pt-6 border-t border-zinc-900">
                            <div class="space-y-2">
                                <label class="text-[10px] text-zinc-500 uppercase tracking-wide block">Footer Metadata Text</label>
                                <input type="text" id="eFooter" placeholder="System structural parameters..." class="w-full">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] text-zinc-500 uppercase tracking-wide block">Footer Icon Asset URL</label>
                                <input type="url" id="eFooterIcon" placeholder="https://resource.path/icon.png" class="w-full">
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <footer class="mt-36 pt-8 border-t border-zinc-900 text-[11px] text-zinc-600 flex flex-col sm:flex-row justify-between gap-4">
            <p>network execution proxy // unverified</p>
            <p>ensure strict authorization verification structures match endpoint criteria parameters.</p>
        </footer>

    </div>

    <script>
        function toggleMode() {
            const isEmbed = document.getElementById('msgType').value === 'embed';
            const embedSec = document.getElementById('embedSection');
            const textSec = document.getElementById('textSection');
            
            if (isEmbed) {
                embedSec.classList.remove('hidden');
                textSec.classList.add('hidden');
            } else {
                embedSec.classList.add('hidden');
                textSec.classList.remove('hidden');
            }
        }

        function clean(obj) {
            for (const key in obj) {
                if (obj[key] === null || obj[key] === undefined || obj[key] === "" || (typeof obj[key] === 'object' && Object.keys(obj[key]).length === 0)) {
                    delete obj[key];
                }
            }
            return Object.keys(obj).length === 0 ? null : obj;
        }

        async function sendMessage() {
            const url = document.getElementById('webhookUrl').value.trim();
            const type = document.getElementById('msgType').value;
            const isRandom = document.getElementById('randomColor').checked;
            const status = document.getElementById('statusDisplay');
            
            if (!url.startsWith('https://discord.com/api/webhooks/')) {
                status.innerText = "fail: invalid_webhook";
                status.className = "text-[9px] tracking-widest uppercase font-bold text-rose-500";
                return;
            }

            let payload = {};

            if (type === 'text') {
                payload.content = document.getElementById('content').value;
                if (!payload.content.trim()) {
                    status.innerText = "fail: empty_payload";
                    status.className = "text-[9px] tracking-widest uppercase font-bold text-rose-500";
                    return;
                }
            } else {
                let colorDecimal = isRandom ? Math.floor(Math.random() * 16777215) : parseInt(document.getElementById('eColor').value.replace('#', ''), 16) || 0;

                const author = clean({
                    name: document.getElementById('eAuthor').value,
                    icon_url: "" 
                });

                const footer = clean({
                    text: document.getElementById('eFooter').value,
                    icon_url: document.getElementById('eFooterIcon').value
                });

                const embed = clean({
                    title: document.getElementById('eTitle').value || null,
                    description: document.getElementById('eDesc').value || null,
                    color: colorDecimal,
                    author: author,
                    footer: footer,
                    thumbnail: clean({ url: document.getElementById('eThumb').value }),
                    image: clean({ url: document.getElementById('eImage').value })
                });

                if (!embed) {
                    status.innerText = "fail: missing_parameters";
                    status.className = "text-[9px] tracking-widest uppercase font-bold text-rose-500";
                    return;
                }
                payload.embeds = [embed];
            }

            status.innerText = "transmitting_payload...";
            status.className = "text-[9px] tracking-widest uppercase font-bold text-emerald-400";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    status.innerText = "success: tracking_logged";
                    status.className = "text-[9px] tracking-widest uppercase font-bold text-emerald-400";
                } else {
                    const errorData = await response.json();
                    status.innerText = `fail: error_${response.status}`;
                    status.className = "text-[9px] tracking-widest uppercase font-bold text-rose-500";
                }
            } catch (err) {
                status.innerText = "fail: trace_interrupted";
                status.className = "text-[9px] tracking-widest uppercase font-bold text-rose-500";
            }
        }
    </script>
</body>
</html>
