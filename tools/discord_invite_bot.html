<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK GEN | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { font-family: 'JetBrains+Mono', monospace; }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(16, 185, 129, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .terminal-grid {
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.03;
        }

        .preserve-3d { transform-style: preserve-3d; perspective: 1000px; }
        .inner-content { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #10b981; }

        input[type="checkbox"] {
            accent-color: #10b981;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-400">

    <!-- Ambient Overlays -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="scanline"></div>
        <div class="absolute inset-0 terminal-grid"></div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-12 relative z-20">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8 border-b border-emerald-500/20 pb-12">
            <div>
                <a href="../index.html" class="text-[10px] font-bold text-emerald-500/60 uppercase tracking-[0.4em] hover:text-emerald-400 transition-all flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-chevron-left"></i> BACK
                </a>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-emerald-400 uppercase cursor-default">
                    INVITE_<span class="text-white">GENERATOR</span>
                </h1>
            </div>
        </header>

        <!-- MAIN UTILITY GRID -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT COLUMN: CONTROLS -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">APPLICATION_ID</label>
                        <input type="text" id="clientId" placeholder="PASTE_CLIENT_ID" oninput="updateLink()"
                               class="w-full bg-black border border-emerald-500/20 rounded-none px-4 py-4 text-xs text-white focus:outline-none focus:border-emerald-500/60 transition-all mb-4 placeholder:text-emerald-900">
                        
                        <div class="pt-6 border-t border-emerald-500/10">
                            <span class="text-[9px] font-bold text-slate-600 uppercase tracking-widest block mb-2">Metadata_Scope:</span>
                            <div class="flex justify-between items-center bg-black/40 p-2 border border-emerald-500/5">
                                <span class="text-[9px] text-slate-500">AUTH_TYPE:</span>
                                <span class="text-[9px] text-emerald-500 font-bold tracking-tighter">BOT / SLASH COMMANDS</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-amber-950/10 border border-amber-500/20 p-6">
                    <div class="flex items-center gap-3 text-amber-500 mb-4">
                        <i class="fa-solid fa-triangle-exclamation text-sm"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Security Warning</span>
                    </div>
                    <p class="text-[10px] text-amber-500/70 leading-relaxed uppercase">
                        Selecting "Administrator" overrides all other permissions. Ensure deployment target is trusted.
                    </p>
                </div>
            </div>

            <!-- RIGHT COLUMN: PERMISSIONS & OUTPUT -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Permissions Matrix -->
                <div class="bg-zinc-950/50 border border-white/5 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] block mb-6 italic">PERMISSION FLAGS</label>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2" id="permList">
                            <!-- Injected via JS -->
                        </div>
                    </div>
                </div>

                <!-- Result Area -->
                <div class="bg-zinc-950/50 border border-emerald-500/20 p-8 relative overflow-hidden preserve-3d">
                    <div class="absolute inset-0 opacity-[0.03] pointer-events-none terminal-grid"></div>
                    
                    <div class="inner-content relative z-10 w-full">
                        <div id="finalUrl" class="text-[10px] text-white break-all bg-black p-6 border border-emerald-500/10 text-center min-h-[60px] flex items-center justify-center tracking-tight">
                            AWAITING CLIENT ID...
                        </div>

                        <div class="mt-8 flex justify-center">
                            <button onclick="copyUrl()" class="group relative px-12 py-4 bg-emerald-500 hover:bg-emerald-400 text-black font-black text-[10px] uppercase tracking-widest transition-all">
                                [ COPY LINK ]
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const permissions = [
            { name: "Administrator", value: 0x8 },
            { name: "Manage Server", value: 0x20 },
            { name: "Manage Roles", value: 0x10000000 },
            { name: "Manage Channels", value: 0x10 },
            { name: "Kick Members", value: 0x2 },
            { name: "Ban Members", value: 0x4 },
            { name: "Create Invite", value: 0x1 },
            { name: "Send Messages", value: 0x800 },
            { name: "Embed Links", value: 0x4000 },
            { name: "Attach Files", value: 0x8000 },
            { name: "Message History", value: 0x10000 },
            { name: "Use Emojis", value: 0x40000 },
            { name: "Add Reactions", value: 0x40 },
            { name: "Connect Voice", value: 0x100000 },
            { name: "Speak Voice", value: 0x200000 }
        ];

        const permListContainer = document.getElementById('permList');
        
        permissions.forEach(p => {
            const div = document.createElement('label');
            div.className = 'flex items-center gap-3 p-3 border border-white/0 hover:border-emerald-500/20 hover:bg-emerald-500/5 cursor-pointer group transition-all';
            div.innerHTML = `
                <input type="checkbox" value="${p.value}" onchange="updateLink()" class="w-4 h-4">
                <span class="text-[9px] font-bold text-slate-500 group-hover:text-emerald-400 uppercase tracking-tighter transition-colors">${p.name}</span>
            `;
            permListContainer.appendChild(div);
        });

        function updateLink() {
            const clientId = document.getElementById('clientId').value.trim();
            const display = document.getElementById('finalUrl');
            
            if (!clientId) {
                display.innerText = "AWAITING_CLIENT_ID...";
                display.classList.add('text-emerald-900');
                return;
            }

            display.classList.remove('text-emerald-900');
            let totalPerms = 0n; 
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
                totalPerms |= BigInt(cb.value);
            });

            const url = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&permissions=${totalPerms}&scope=bot%20applications.commands`;
            display.innerText = url;
        }

        function copyUrl() {
            const text = document.getElementById('finalUrl').innerText;
            if (text.startsWith('http')) {
                navigator.clipboard.writeText(text);
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '[ LINK_SECURED ]';
                btn.style.backgroundColor = '#22d3ee'; // Cyan shift
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.backgroundColor = '';
                }, 2000);
            }
        }
    </script>
</body>
</html>
