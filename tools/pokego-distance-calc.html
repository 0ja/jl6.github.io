<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISTANCE COOLDOWN | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { font-family: 'JetBrains+Mono', monospace; }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(16, 185, 129, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .terminal-grid {
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.03;
        }

        .preserve-3d { transform-style: preserve-3d; perspective: 1000px; }
        .inner-content { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .map-container {
            height: 500px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.1);
            position: relative;
            overflow: hidden;
        }

        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* Override Leaflet Dark Theme */
        .leaflet-container { background: #000 !important; }
        .leaflet-bar a { background-color: #0a0a0a !important; color: #10b981 !important; border-bottom: 1px solid #10b98120 !important; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b981; }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-400">

    <div id="app">
        <div class="fixed inset-0 pointer-events-none">
            <div class="scanline"></div>
            <div class="absolute inset-0 terminal-grid"></div>
        </div>

        <div class="max-w-6xl mx-auto px-6 py-12 relative z-20">
            
            <!-- HEADER -->
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8 border-b border-emerald-500/20 pb-12">
                <div>
                    <a href="../index.html" class="text-[10px] font-bold text-emerald-500/60 uppercase tracking-[0.4em] hover:text-emerald-400 transition-all flex items-center gap-2 mb-4">
                        <i class="fa-solid fa-chevron-left"></i> BACK
                    </a>
                    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-emerald-400 uppercase cursor-default">
                        DIST_<span class="text-white">COOLDOWN</span>
                    </h1>
                </div>

                <button @click="calculateDistance" class="bg-emerald-500 hover:bg-emerald-400 text-black font-black text-[10px] px-8 py-4 uppercase tracking-[0.2em] transition-all">
                    [ CALCULATE ]
                </button>
            </header>

            <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- LEFT COLUMN: COORDINATE INPUT -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                        <div class="inner-content space-y-6">
                            <div>
                                <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">ORIGIN</label>
                                <input type="text" placeholder="LAT, LON" v-model="point1" 
                                    class="w-full bg-black border border-emerald-500/20 p-4 text-[11px] text-emerald-500 focus:outline-none focus:border-emerald-500 transition-all font-mono">
                            </div>
                            
                            <div>
                                <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">DESTINATION</label>
                                <input type="text" placeholder="LAT, LON" v-model="point2" 
                                    class="w-full bg-black border border-emerald-500/20 p-4 text-[11px] text-emerald-500 focus:outline-none focus:border-emerald-500 transition-all font-mono">
                            </div>
                        </div>
                    </div>

                    <!-- RESULTS CARDS -->
                    <div v-if="result" class="space-y-4 animate-in fade-in slide-in-from-left duration-500">
                        <div class="bg-zinc-950/50 border border-emerald-500/40 p-6">
                            <span class="text-[9px] text-emerald-500/50 uppercase tracking-widest block mb-1">Calculated Range</span>
                            <div class="text-2xl font-black text-emerald-400 tracking-tighter italic">
                                {{ result.replace('Distance: ', '') }}
                            </div>
                        </div>
                        <div class="bg-zinc-950/50 border border-white/10 p-6">
                            <span class="text-[9px] text-slate-500 uppercase tracking-widest block mb-1">Required Cooldown</span>
                            <div class="text-2xl font-black text-white tracking-tighter italic">
                                {{ waitTime.replace('Cooldown: ', '') }}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: GEOSPATIAL RENDER -->
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-zinc-950/50 border border-emerald-500/20 p-4 preserve-3d">
                        <div class="inner-content">
                            <div class="map-container relative">
                                <div id="map"></div>
                                <div v-if="!map" class="absolute inset-0 flex items-center justify-center bg-black/60 z-10 pointer-events-none">
                                    <div class="text-center">
                                        <i class="fa-solid fa-satellite text-emerald-500/20 text-3xl mb-4"></i>
                                        <p class="text-[10px] text-emerald-500/30 uppercase tracking-[0.5em]">Awaiting lon - lat...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-zinc-950/50 border border-white/5 p-6 italic">
                        <p class="text-[10px] text-slate-500 leading-relaxed uppercase tracking-wider">
                            <span class="text-emerald-500/50 font-bold">NOTE:</span>For PokemonGo spoofers that need a Sniping Cooldowns. :)
                        </p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                point1: '',
                point2: '',
                result: '',
                waitTime: '',
                map: null,
                marker1: null,
                marker2: null,
                polyline: null
            },
            methods: {
                calculateDistance() {
                    const location1 = this.point1.split(",");
                    const location2 = this.point2.split(",");
                    if (location1.length < 2 || location2.length < 2) {
                        alert("ERROR: PROTOCOL_VIOLATION - Valid Lat/Lon coordinates required.");
                        return;
                    }

                    const lat1 = parseFloat(location1[0]);
                    const lon1 = parseFloat(location1[1]);
                    const lat2 = parseFloat(location2[0]);
                    const lon2 = parseFloat(location2[1]);

                    const R = 3959; // Miles
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lon2 - lon1) * Math.PI / 180;
                    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                              Math.sin(dLon / 2) * Math.sin(dLon / 2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                    const distance = R * c;

                    this.result = `Distance: ${distance.toFixed(2)} Miles`;
                    
                    let seconds = 0;
                    if (distance <= 1) seconds = 30;
                    else if (distance <= 5) seconds = 150;
                    else if (distance <= 10) seconds = 420;
                    else if (distance <= 100) seconds = 2100;
                    else if (distance <= 250) seconds = 2700;
                    else if (distance <= 500) seconds = 3600;
                    else if (distance <= 1000) seconds = 5940;
                    else seconds = 7200;

                    const h = Math.floor(seconds / 3600);
                    const m = Math.floor((seconds % 3600) / 60);
                    const s = seconds % 60;
                    this.waitTime = `Cooldown: ${h > 0 ? h + 'h ' : ''}${m > 0 ? m + 'm ' : ''}${s}s`;

                    this.updateMap(lat1, lon1, lat2, lon2);
                },
                updateMap(lat1, lon1, lat2, lon2) {
                    this.$nextTick(() => {
                        if (!this.map) {
                            this.map = L.map('map', { zoomControl: false }).setView([lat1, lon1], 13);
                            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                                attribution: '&copy; CARTO'
                            }).addTo(this.map);
                            L.control.zoom({ position: 'bottomright' }).addTo(this.map);
                        }
                        if (this.marker1) this.map.removeLayer(this.marker1);
                        if (this.marker2) this.map.removeLayer(this.marker2);
                        if (this.polyline) this.map.removeLayer(this.polyline);

                        // Tactical Marker Style
                        const tacticalIcon = L.divIcon({
                            className: 'tactical-marker',
                            html: '<div style="width:12px;height:12px;background:#10b981;border:2px solid #fff;border-radius:50%;box-shadow:0 0 10px #10b981;"></div>',
                            iconSize: [12, 12]
                        });

                        this.marker1 = L.marker([lat1, lon1], { icon: tacticalIcon }).addTo(this.map);
                        this.marker2 = L.marker([lat2, lon2], { icon: tacticalIcon }).addTo(this.map);
                        this.polyline = L.polyline([[lat1, lon1], [lat2, lon2]], { 
                            color: '#10b981', 
                            weight: 2,
                            dashArray: '5, 10',
                            opacity: 0.8
                        }).addTo(this.map);
                        
                        const group = new L.featureGroup([this.marker1, this.marker2]);
                        this.map.fitBounds(group.getBounds().pad(0.5));
                    });
                }
            }
        });
    </script>
</body>
</html>
