<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGE TO CSS | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { font-family: 'JetBrains+Mono', monospace; }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(16, 185, 129, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .terminal-grid {
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.03;
        }

        .preserve-3d { transform-style: preserve-3d; perspective: 1000px; }
        .inner-content { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .preview-area {
            min-height: 400px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.1);
            position: relative;
            overflow: auto;
        }

        input[type="file"]::file-selector-button {
            background: #10b981;
            color: black;
            border: none;
            padding: 8px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: #34d399;
        }

        input[type="range"] {
            accent-color: #10b981;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b981; }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-400">

    <div class="fixed inset-0 pointer-events-none">
        <div class="scanline"></div>
        <div class="absolute inset-0 terminal-grid"></div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-12 relative z-20">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8 border-b border-emerald-500/20 pb-12">
            <div>
                <a href="../index.html" class="text-[10px] font-bold text-emerald-500/60 uppercase tracking-[0.4em] hover:text-emerald-400 transition-all flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-chevron-left"></i> BACK
                </a>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-emerald-400 uppercase cursor-default">
                    IMAGE_<span class="text-white">TO CSS</span>
                </h1>
            </div>

            <div class="flex gap-4">
                <button id="copyBtn" class="bg-emerald-500 hover:bg-emerald-400 text-black font-black text-[10px] px-8 py-4 uppercase tracking-[0.2em] transition-all">
                    [ COPY CSS ]
                </button>
                <button id="downloadBtn" class="border border-emerald-500/30 hover:border-emerald-500 text-emerald-500 font-black text-[10px] px-8 py-4 uppercase tracking-[0.2em] transition-all">
                    [ EXPORT HTML ]
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT COLUMN: CONTROLS -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">// 01_SOURCE IMAGE</label>
                        <input type="file" id="upload" accept="image/*" class="w-full text-[9px] text-slate-500 file:mr-4">
                        
                        <div class="mt-8 pt-8 border-t border-emerald-500/10">
                            <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-2 italic">// 02_PIXEL SCALE: <span id="scaleVal">1</span>PX</label>
                            <input type="range" id="scale" min="1" max="20" value="1" class="w-full">
                        </div>
                    </div>
                </div>

                <div class="bg-zinc-950/50 border border-white/5 p-6">
                    <div class="flex items-center gap-3 text-slate-500 mb-4">
                        <i class="fa-solid fa-microchip text-xs"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Process</span>
                    </div>
                    <p class="text-[9px] text-slate-600 leading-relaxed uppercase">
                        This tool converts pixel data into CSS box-shadow offsets. High resolution images may cause browser lag. Max suggested width: 80px.
                    </p>
                </div>
            </div>

            <!-- RIGHT COLUMN: PREVIEW & CODE -->
            <div class="lg:col-span-8 space-y-6">
                <div class="bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">LIVE RENDER PREVIEW</label>
                        <div class="preview-area flex items-center justify-center p-8">
                            <div id="css-pixel"></div>
                        </div>
                    </div>
                </div>

                <div class="bg-zinc-950/50 border border-white/5 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">GENERATED</label>
                        <textarea id="css-code" readonly placeholder="AWAITING_IMAGE_UPLOAD..." 
                            class="w-full h-32 bg-black border border-emerald-500/10 p-4 text-[9px] text-emerald-500/80 font-mono focus:outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const scaleInput = document.getElementById('scale');
        const scaleVal = document.getElementById('scaleVal');
        const cssPixel = document.getElementById('css-pixel');
        const cssCode = document.getElementById('css-code');

        let lastImage = null;

        scaleInput.addEventListener('input', () => {
            scaleVal.innerText = scaleInput.value;
            if (lastImage) processImage(lastImage);
        });

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    lastImage = img;
                    processImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function processImage(img) {
            const scale = parseInt(scaleInput.value);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const maxWidth = 80; 
            let w = img.width;
            let h = img.height;
            if (w > maxWidth) {
                h = (maxWidth / w) * h;
                w = maxWidth;
            }

            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);

            const data = ctx.getImageData(0, 0, w, h).data;
            let shadows = [];

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    if (data[i + 3] > 10) { 
                        shadows.push(`${x * scale}px ${y * scale}px 0 ${scale / 2}px rgba(${data[i]},${data[i+1]},${data[i+2]},${data[i+3]/255})`);
                    }
                }
            }

            const style = `width: 0; height: 0; box-shadow: ${shadows.join(', ')};`;
            cssPixel.style.cssText = style;
            cssCode.value = style;
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            if(!cssCode.value) return;
            cssCode.select();
            document.execCommand('copy');
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerText;
            btn.innerText = '[ COPIED_TO_CLIPBOARD ]';
            btn.style.backgroundColor = '#22d3ee';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = '';
            }, 2000);
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if(!cssCode.value) return;
            const htmlContent = `<!DOCTYPE html><html><body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;margin:0;">
            <div style="${cssCode.value}"></div>
            </body></html>`;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'css-payload.html';
            link.click();
        });
    </script>
</body>
</html>
