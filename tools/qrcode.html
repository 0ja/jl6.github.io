<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR GEN | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }

        .tab-btn.active {
            color: #10b981 !important;
            font-weight: 700;
        }
        
        textarea {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid #18181b !important;
            border-radius: 0px !important;
            color: #e4e4e7 !important;
            font-size: 12px !important;
            padding: 10px 0px !important;
            transition: border-color 0.3s ease !important;
        }
        
        textarea:focus {
            outline: none !important;
            border-color: #52525b !important;
        }

        .qr-output-card {
            background: #ffffff;
            padding: 1.5rem;
            display: inline-flex;
        }

        #drop-zone {
            border: 1px dashed #18181b;
            transition: all 0.3s ease;
        }
        
        #drop-zone:hover { 
            border-color: #3f3f46;
            background: #0f0f11/40;
        }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 2px; height: 2px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-zinc-400 min-h-screen selection:bg-zinc-800 selection:text-white antialiased">

    <div class="max-w-5xl mx-auto px-8 py-20">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-24 gap-6">
            <div>
                <a href="../index.html" class="text-[10px] tracking-widest text-zinc-600 hover:text-zinc-400 transition-colors block mb-3">
                    [ back_to_index ]
                </a>
                <h1 class="text-2xl font-bold tracking-tight text-zinc-100">
                    qr_<span class="text-zinc-500 font-normal">gen</span>
                </h1>
            </div>

            <div class="flex gap-6 border-b border-zinc-900 pb-1 sm:pb-0 sm:border-none">
                <button onclick="switchTab('encoder')" id="tab-encoder" class="tab-btn active text-[10px] text-zinc-500 hover:text-zinc-300 tracking-widest font-medium uppercase transition-colors">
                    [ ENCODER ]
                </button>
                <button onclick="switchTab('decoder')" id="tab-decoder" class="tab-btn text-[10px] text-zinc-600 hover:text-zinc-300 tracking-widest font-medium uppercase transition-colors">
                    [ DECODER ]
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-4 space-y-12">
                
                <div id="controls-encoder" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold block">paste your link or text below</label>
                        <textarea id="urlInput" placeholder="ENTER_URL_OR_DATA..." rows="6" class="w-full font-mono resize-none">https://google.com</textarea>
                    </div>
                    
                    <button onclick="generateQRCode()" class="text-[10px] text-zinc-500 hover:text-emerald-400 tracking-[0.2em] font-bold uppercase border border-zinc-900 px-6 py-3 transition-colors bg-zinc-950/20 w-full">
                        GENERATE QR CODE
                    </button>
                </div>

                <div id="controls-decoder" class="hidden space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold block"></label>
                        <p class="text-xs text-zinc-500 leading-relaxed">
                          
                        </p>
                    </div>
                    
                    <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="p-12 text-center cursor-pointer rounded">
                        <p class="text-zinc-500 text-[10px] tracking-widest uppercase font-medium">upload image</p>
                        <input type="file" id="file-input" hidden accept="image/*">
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="min-h-[400px] bg-zinc-950/20 rounded border border-zinc-950 flex flex-col items-center justify-center p-8 overflow-auto">
                    
                    <div id="encoder-output" class="flex flex-col items-center">
                        <div class="qr-output-card rounded-sm">
                            <div id="qrcode"></div>
                        </div>
                        <div class="mt-8 flex items-center gap-3">
                            <div class="w-1.5 h-1.5 bg-zinc-700 rounded-full animate-pulse"></div>
                            <p id="statusMessage" class="text-[10px] text-zinc-500 tracking-widest uppercase font-mono">ready</p>
                        </div>
                    </div>

                    <div id="decoder-output" class="hidden w-full">
                        <div id="result-area" class="w-full max-w-xl mx-auto p-6 hidden"></div>
                        <div id="placeholder-decoder" class="text-center select-none">
                            <p class="text-[10px] tracking-[0.4em] text-zinc-700 uppercase font-bold">awaiting</p>
                            <p class="text-[9px] text-zinc-600 mt-2 lowercase"></p>
                        </div>
                    </div>
                    
                </div>
            </div>
        </main>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        function switchTab(tab) {
            const encoderCtrl = document.getElementById('controls-encoder');
            const decoderCtrl = document.getElementById('controls-decoder');
            const encoderOut = document.getElementById('encoder-output');
            const decoderOut = document.getElementById('decoder-output');
            const encoderBtn = document.getElementById('tab-encoder');
            const decoderBtn = document.getElementById('tab-decoder');

            if (tab === 'encoder') {
                encoderCtrl.classList.remove('hidden');
                decoderCtrl.classList.add('hidden');
                encoderOut.classList.remove('hidden');
                decoderOut.classList.add('hidden');
                encoderBtn.classList.add('active');
                decoderBtn.classList.remove('active');
            } else {
                encoderCtrl.classList.add('hidden');
                decoderCtrl.classList.remove('hidden');
                encoderOut.classList.add('hidden');
                decoderOut.classList.remove('hidden');
                decoderBtn.classList.add('active');
                encoderBtn.classList.remove('active');
            }
        }

        function generateQRCode() {
            const urlInput = document.getElementById('urlInput');
            const qrcodeContainer = document.getElementById('qrcode');
            const statusMessage = document.getElementById('statusMessage');
            const url = urlInput.value.trim() || 'https://google.com';

            qrcodeContainer.innerHTML = '';
            statusMessage.innerHTML = `status: <span class="text-zinc-400 font-bold">compiling_blocks...</span>`;
            
            setTimeout(() => {
                new QRCode(qrcodeContainer, {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark : "#0a0a0a",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
                statusMessage.innerHTML = `status: <span class="text-emerald-400 font-bold font-sans">ENCODED_SUCCESS</span>`;
            }, 250);
        }

        const fileInput = document.getElementById('file-input');
        const resultArea = document.getElementById('result-area');
        const placeholder = document.getElementById('placeholder-decoder');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    resultArea.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    
                    if (code) {
                        resultArea.className = 'w-full max-w-xl mx-auto p-4 border-t border-zinc-900 space-y-4';
                        resultArea.innerHTML = `
                            <div class="text-zinc-500 text-[10px] font-bold tracking-widest uppercase">// DECODED_PAYLOAD_STRING:</div>
                            <div class="text-xs text-zinc-100 break-all font-mono tracking-wide pt-1">${code.data}</div>
                        `;
                    } else {
                        resultArea.className = 'w-full max-w-xl mx-auto p-4 border-t border-zinc-900';
                        resultArea.innerHTML = `<div class="text-rose-500 text-[10px] tracking-widest uppercase font-bold">
                            fail: telemetry_unreadable / matrix_not_detected</div>`;
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        window.onload = generateQRCode;
    </script>
</body>
</html>
