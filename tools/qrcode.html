<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR GEN | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { font-family: 'JetBrains+Mono', monospace; }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(16, 185, 129, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .terminal-grid {
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.03;
        }

        .preserve-3d { transform-style: preserve-3d; perspective: 1000px; }
        .inner-content { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .tab-btn.active {
            background: rgba(16, 185, 129, 0.15);
            border-color: #10b981;
            color: #10b981;
        }

        .qr-output-card {
            background: #ffffff;
            padding: 1.5rem;
            display: inline-flex;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
        }

        #drop-zone {
            border: 1px dashed rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }
        
        #drop-zone:hover { 
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b981; }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-400">

    <div class="fixed inset-0 pointer-events-none">
        <div class="scanline"></div>
        <div class="absolute inset-0 terminal-grid"></div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-12 relative z-20">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8 border-b border-emerald-500/20 pb-12">
            <div>
                <a href="../index.html" class="text-[10px] font-bold text-emerald-500/60 uppercase tracking-[0.4em] hover:text-emerald-400 transition-all flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-chevron-left"></i> BACK
                </a>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-emerald-400 uppercase cursor-default">
                    QR_<span class="text-white">GEN</span>
                </h1>
            </div>

            <div class="flex gap-2 bg-zinc-950/50 p-1 border border-white/5">
                <button onclick="switchTab('encoder')" id="tab-encoder" class="tab-btn active px-8 py-3 text-[10px] font-black uppercase tracking-widest transition-all">
                    ENCODER
                </button>
                <button onclick="switchTab('decoder')" id="tab-decoder" class="tab-btn px-8 py-3 text-[10px] font-black uppercase tracking-widest text-slate-600 transition-all">
                    DECODER
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT COLUMN: CONTROLS -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Encoder Controls -->
                <div id="controls-encoder" class="bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">PASTE YOUR LINK</label>
                        <textarea id="urlInput" placeholder="ENTER_URL_OR_DATA..." 
                            class="w-full h-32 bg-black border border-emerald-500/20 p-4 text-[11px] text-emerald-400 focus:outline-none focus:border-emerald-500 transition-all resize-none mb-6">https://google.com</textarea>
                        
                        <button onclick="generateQRCode()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black py-4 text-[10px] uppercase tracking-widest transition-all">
                            GENERATE QR CODE
                        </button>
                    </div>
                </div>

                <!-- Decoder Controls -->
                <div id="controls-decoder" class="hidden bg-zinc-950/50 border border-emerald-500/20 p-8 preserve-3d">
                    <div class="inner-content">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">SCAN QR CODE</label>
                        <p class="text-[9px] text-slate-500 leading-relaxed mb-8 uppercase tracking-wider">
                            Local client-side analysis. No data is transmitted during inspection.
                        </p>
                        <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="p-12 text-center cursor-pointer group">
                            <i class="fa-solid fa-expand text-2xl text-slate-700 group-hover:text-emerald-400 mb-4 transition-colors"></i>
                            <p class="text-slate-500 text-[9px] font-black tracking-widest uppercase">Select Image</p>
                            <input type="file" id="file-input" hidden accept="image/*">
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: VISUAL OUTPUT -->
            <div class="lg:col-span-8">
                <div class="bg-zinc-950/50 border border-emerald-500/20 p-8 md:p-16 flex flex-col items-center justify-center min-h-[550px] preserve-3d">
                    
                    <!-- ENCODER OUTPUT -->
                    <div id="encoder-output" class="inner-content flex flex-col items-center">
                        <div class="qr-output-card">
                            <div id="qrcode"></div>
                        </div>
                        <div class="mt-12 flex items-center gap-4">
                            <div class="w-2 h-2 bg-emerald-500 animate-pulse"></div>
                            <p id="statusMessage" class="text-[10px] text-emerald-500/70 tracking-[0.3em] uppercase">Ready</p>
                        </div>
                    </div>

                    <!-- DECODER OUTPUT -->
                    <div id="decoder-output" class="hidden inner-content w-full">
                        <div id="result-area" class="w-full max-w-2xl mx-auto p-10 border border-emerald-500/20 bg-black/40 hidden"></div>
                        <div id="placeholder-decoder" class="text-center opacity-20">
                            <i class="fa-solid fa-braille text-6xl mb-6"></i>
                            <p class="text-[10px] font-bold uppercase tracking-[0.5em]">Waiting on the QR CODE</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        function switchTab(tab) {
            const encoderCtrl = document.getElementById('controls-encoder');
            const decoderCtrl = document.getElementById('controls-decoder');
            const encoderOut = document.getElementById('encoder-output');
            const decoderOut = document.getElementById('decoder-output');
            const encoderBtn = document.getElementById('tab-encoder');
            const decoderBtn = document.getElementById('tab-decoder');

            if (tab === 'encoder') {
                encoderCtrl.classList.remove('hidden');
                decoderCtrl.classList.add('hidden');
                encoderOut.classList.remove('hidden');
                decoderOut.classList.add('hidden');
                encoderBtn.classList.add('active');
                decoderBtn.classList.remove('active');
            } else {
                encoderCtrl.classList.add('hidden');
                decoderCtrl.classList.remove('hidden');
                encoderOut.classList.add('hidden');
                decoderOut.classList.remove('hidden');
                decoderBtn.classList.add('active');
                encoderBtn.classList.remove('active');
            }
        }

        function generateQRCode() {
            const urlInput = document.getElementById('urlInput');
            const qrcodeContainer = document.getElementById('qrcode');
            const statusMessage = document.getElementById('statusMessage');
            const url = urlInput.value.trim() || 'https://google.com';

            qrcodeContainer.innerHTML = '';
            statusMessage.innerHTML = `PROTOCOL: <span class="text-white">ENCODING_PAYLOAD...</span>`;
            
            setTimeout(() => {
                new QRCode(qrcodeContainer, {
                    text: url,
                    width: 250,
                    height: 250,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
                statusMessage.innerHTML = `STATUS: <span class="text-emerald-400">ENCODED_SUCCESS</span>`;
            }, 300);
        }

        const fileInput = document.getElementById('file-input');
        const resultArea = document.getElementById('result-area');
        const placeholder = document.getElementById('placeholder-decoder');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    resultArea.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    
                    if (code) {
                        resultArea.className = 'w-full max-w-2xl mx-auto p-10 border border-emerald-500/40 bg-emerald-500/5';
                        resultArea.innerHTML = `
                            <div class="text-emerald-400 text-[10px] font-black tracking-widest uppercase mb-6 italic">// DECODED_INTEL_PAYLOAD:</div>
                            <div class="text-[12px] text-white break-all bg-black p-6 border border-white/10 font-mono tracking-wider">${code.data}</div>
                        `;
                    } else {
                        resultArea.className = 'w-full max-w-2xl mx-auto p-10 border border-red-500/30 bg-red-500/5';
                        resultArea.innerHTML = `<div class="text-red-400 text-[10px] font-black tracking-widest uppercase flex items-center gap-3">
                            <i class="fa-solid fa-triangle-exclamation"></i> ERROR: NO_DATA_DETECTED_IN_SECTOR</div>`;
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        window.onload = generateQRCode;
    </script>
</body>
</html>
