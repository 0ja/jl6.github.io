<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUICK PASTE | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; }

        textarea {
            background: transparent !important;
            border: none !important;
            color: #10b981 !important;
            font-size: 13px !important;
            line-height: 1.6 !important;
            resize: none !important;
        }
        
        textarea:focus {
            outline: none !important;
        }

        textarea::placeholder {
            color: #1c1c21 !important;
        }

        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-zinc-400 min-h-screen selection:bg-zinc-800 selection:text-white antialiased">

    <div class="max-w-5xl mx-auto px-8 py-20">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-24 gap-6">
            <div>
                <a href="../index.html" class="text-[10px] tracking-widest text-zinc-600 hover:text-zinc-400 transition-colors block mb-3">
                    [ back_to_index ]
                </a>
                <h1 class="text-2xl font-bold tracking-tight text-zinc-100">
                    paste_<span class="text-zinc-500 font-normal">your_code</span>
                </h1>
            </div>

            <div class="flex flex-wrap gap-4 w-full sm:w-auto">
                <button onclick="downloadFile()" class="text-[10px] text-zinc-500 hover:text-zinc-300 tracking-widest font-medium uppercase border border-zinc-900 px-6 py-3 transition-colors bg-zinc-950/20 flex-1 sm:flex-none">
                    [ EXPORT ]
                </button>
                <button onclick="clearEditor()" class="text-[10px] text-zinc-600 hover:text-rose-400 tracking-widest font-medium uppercase border border-zinc-900 px-6 py-3 transition-colors bg-zinc-950/20 flex-1 sm:flex-none">
                    [ ERASE ]
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-3 space-y-6">
                <div class="space-y-2 border-l border-zinc-800 pl-4 py-1">
                    <span class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold block">Read</span>
                    <p class="text-xs text-zinc-500 leading-relaxed">
                        Refreshing erases everything.
                    </p>
                </div>
            </div>

            <div class="lg:col-span-9 space-y-4">
                <div class="border-b border-zinc-900 pb-2">
                    <span class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold">Paste below</span>
                </div>
                
                <div class="bg-zinc-950/10 rounded border border-zinc-950 flex flex-col h-[55vh] min-h-[400px]">
                    <textarea id="textInput" placeholder="> awaiting_text_or_payload_input..." class="w-full h-full p-6 focus:outline-none flex-1"></textarea>
                    
                    <div class="px-6 py-3 border-t border-zinc-950 flex justify-between items-center bg-zinc-950/20">
                        <div id="charCount" class="text-[10px] text-zinc-600 tracking-wider font-mono uppercase transition-colors">0_chars</div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const textarea = document.getElementById('textInput');
        const charCountDisplay = document.getElementById('charCount');

        textarea.addEventListener('input', () => {
            const count = textarea.value.length;
            charCountDisplay.innerText = `${count.toLocaleString()}_chars`;
            
            if (count > 0) {
                charCountDisplay.className = "text-[10px] text-emerald-500 tracking-wider font-mono uppercase font-bold";
            } else {
                charCountDisplay.className = "text-[10px] text-zinc-600 tracking-wider font-mono uppercase";
            }
        });

        function clearEditor() {
            if (confirm("Confirm clearing buffer contents?")) {
                textarea.value = '';
                charCountDisplay.innerText = '0_chars';
                charCountDisplay.className = "text-[10px] text-zinc-600 tracking-wider font-mono uppercase";
            }
        }

        function downloadFile() {
            if (!textarea.value.trim()) {
                alert("Action cancelled: Text content buffer is currently unpopulated.");
                return;
            }
            const blob = new Blob([textarea.value], { type: 'text/plain' });
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            link.download = `LOG_${timestamp}.txt`;
            link.href = window.URL.createObjectURL(blob);
            link.click();
        }
    </script>
</body>
</html>
