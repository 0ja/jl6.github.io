<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUICK PASTE | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #000;
            color: #e2e8f0;
        }

        .terminal-grid {
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.03;
        }

        .glass-panel {
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .editor-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(16, 185, 129, 0.1);
            transition: border 0.3s ease;
        }

        .editor-box:focus-within {
            border-color: rgba(16, 185, 129, 0.5);
        }

        #textInput::placeholder {
            color: rgba(16, 185, 129, 0.3);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #10b981;
        }

        .action-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-btn:hover {
            background: #10b981;
            color: #000;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        /* Custom scrollbar for terminal look */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b981; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden p-4 md:p-10">

    <div class="fixed inset-0 pointer-events-none terminal-grid"></div>

    <div class="max-w-6xl mx-auto relative z-10">
        <!-- TOP NAV / HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6 border-b border-emerald-500/10 pb-8">
            <div>
                <a href="../index.html" class="text-[10px] font-bold text-emerald-500/60 uppercase tracking-[0.4em] hover:text-emerald-400 transition-all flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-chevron-left text-[8px]"></i> BACK
                </a>
                <h1 class="text-4xl font-extrabold tracking-tighter text-emerald-400 uppercase">
                    PASTE_<span class="text-white">YOUR CODE</span>
                </h1>
            </div>

            <div class="flex gap-4 w-full md:w-auto">
                <button onclick="downloadFile()" class="action-btn flex-1 md:flex-none border border-emerald-500/30 px-6 py-3 text-[10px] font-black uppercase tracking-widest bg-emerald-500/5">
                    EXPORT
                </button>
                <button onclick="clearEditor()" class="action-btn flex-1 md:flex-none border border-red-500/30 px-6 py-3 text-[10px] font-black uppercase tracking-widest bg-red-500/5 text-red-400 hover:bg-red-500 hover:text-white">
                    ERASE
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- ALERT / SYSTEM INFO -->
            <div class="lg:col-span-3 space-y-6">
                <div class="glass-panel p-6 border-l-4 border-l-emerald-500">
                    <div class="flex items-center gap-3 mb-3">
                        <i class="fa-solid fa-triangle-exclamation text-emerald-500 text-xs"></i>
                        <h2 class="text-[10px] font-black uppercase tracking-[0.2em]">Memory State</h2>
                    </div>
                    <p class="text-[10px] text-slate-500 leading-relaxed uppercase">
                    Refreshing the browser will purge all current payload data from local memory.
                    </p>
                </div>
                </div>
            </div>

            <!-- EDITOR AREA -->
            <div class="lg:col-span-9">
                <div class="editor-box rounded-sm flex flex-col h-[65vh] min-h-[400px]">
                    <div class="flex items-center gap-4 bg-zinc-950/80 px-6 py-3 border-b border-white/5">
                        <div class="flex gap-1.5">
                            <div class="w-2 h-2 rounded-full bg-red-500/20"></div>
                            <div class="w-2 h-2 rounded-full bg-amber-500/20"></div>
                            <div class="w-2 h-2 rounded-full bg-emerald-500/20"></div>
                        </div>
                        <span class="text-[9px] font-bold text-slate-600 uppercase tracking-widest italic">PASTE TXT</span>
                    </div>
                    
                    <textarea id="textInput" placeholder="> READY_FOR_INPUT..." 
                        class="flex-1 bg-transparent border-none text-emerald-400 p-8 text-[13px] leading-relaxed focus:outline-none resize-none selection:bg-emerald-500/30"></textarea>
                    
                    <div class="bg-zinc-950/80 px-8 py-4 border-t border-white/5 flex justify-between items-center">
                        <div id="charCount" class="text-[9px] font-black text-slate-500 tracking-[0.2em]">0 CHARS</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('textInput');
        const charCountDisplay = document.getElementById('charCount');

        textarea.addEventListener('input', () => {
            const count = textarea.value.length;
            charCountDisplay.innerText = `${count.toLocaleString()}_CHARS`;
            
            if (count > 0) {
                charCountDisplay.classList.replace('text-slate-500', 'text-emerald-500');
            } else {
                charCountDisplay.classList.replace('text-emerald-500', 'text-slate-500');
            }
        });

        function clearEditor() {
            if (confirm("CRITICAL: Wipe entire buffer content?")) {
                textarea.value = '';
                charCountDisplay.innerText = '0_CHARS';
                charCountDisplay.classList.replace('text-emerald-500', 'text-slate-500');
            }
        }

        function downloadFile() {
            if (!textarea.value.trim()) {
                alert("PROTOCOL_ERROR: Buffer is empty.");
                return;
            }
            const blob = new Blob([textarea.value], { type: 'text/plain' });
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            link.download = `LOG_${timestamp}.txt`;
            link.href = window.URL.createObjectURL(blob);
            link.click();
        }
    </script>
</body>
</html>
