<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL MAP | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { font-family: 'JetBrains+Mono', monospace; }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(16, 185, 129, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .terminal-grid {
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.03;
        }

        .preserve-3d { transform-style: preserve-3d; perspective: 1000px; }
        .inner-content { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .canvas-container {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.1);
            min-height: 600px;
            position: relative;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            height: auto !important;
            cursor: crosshair;
            display: block;
        }

        .tool-btn.active {
            background: rgba(16, 185, 129, 0.15);
            border-color: #10b981;
            color: #10b981;
        }

        input[type="file"]::file-selector-button {
            background: #10b981;
            color: black;
            border: none;
            padding: 8px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b981; }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-400">

    <div class="fixed inset-0 pointer-events-none">
        <div class="scanline"></div>
        <div class="absolute inset-0 terminal-grid"></div>
    </div>

    <div class="max-w-[1400px] mx-auto px-6 py-12 relative z-20">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-8 border-b border-emerald-500/20 pb-12">
            <div>
                <a href="../index.html" class="text-[10px] font-bold text-emerald-500/60 uppercase tracking-[0.4em] hover:text-emerald-400 transition-all flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-chevron-left"></i> BACK
                </a>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-emerald-400 uppercase cursor-default">
                    TACTICAL_<span class="text-white">MAPPING</span>
                </h1>
            </div>

            <div class="flex flex-wrap gap-4">
                <div class="bg-zinc-950/50 border border-emerald-500/10 p-4">
                    <label class="text-[9px] text-emerald-500/50 uppercase block mb-2 tracking-widest">UPLOAD IMAGE</label>
                    <input type="file" id="upload" accept="image/*" class="text-[9px]">
                </div>
                <button onclick="download()" class="bg-emerald-500 hover:bg-emerald-400 text-black font-black text-[10px] px-8 py-4 uppercase tracking-[0.2em] transition-all self-center">
                    [ DOWNLOAD IMAGE ]
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT COLUMN: ARMAMENT CONTROLS -->
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-zinc-950/50 border border-emerald-500/20 p-6 preserve-3d">
                    <div class="inner-content space-y-2" id="toolMenu">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-4 italic">TOOLS</label>
                        <button onclick="setTool('brush')" id="brushBtn" class="tool-btn active w-full text-left text-[10px] p-3 border border-emerald-500/10 hover:bg-emerald-500/5 transition-all">BRUSH</button>
                        <button onclick="setTool('rect')" id="rectBtn" class="tool-btn w-full text-left text-[10px] p-3 border border-emerald-500/10 hover:bg-emerald-500/5 transition-all">RECTANGLE</button>
                        <button onclick="setTool('arrow')" id="arrowBtn" class="tool-btn w-full text-left text-[10px] p-3 border border-emerald-500/10 hover:bg-emerald-500/5 transition-all">ARROW</button>
                        <button onclick="setTool('label')" id="labelBtn" class="tool-btn w-full text-left text-[10px] p-3 border border-emerald-500/10 hover:bg-emerald-500/5 transition-all">ALLIANCE TAG</button>
                        <button onclick="setTool('eraser')" id="eraserBtn" class="tool-btn w-full text-left text-[10px] p-3 border border-emerald-500/10 hover:bg-red-500/10 text-red-500/60 transition-all">ERASER</button>
                    </div>
                </div>

                <div class="bg-zinc-950/50 border border-white/5 p-6 preserve-3d">
                    <div class="inner-content space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">ALLIANCE ID</label>
                            <select id="labelSelect" class="w-full bg-black border border-emerald-500/20 text-white text-[10px] p-2 mb-2 focus:outline-none focus:border-emerald-500">
                                <option>HO1Y</option>
                                <option>IRON</option>
                                <option>GREY</option>
                            </select>
                            <div class="flex gap-2">
                                <input type="text" id="customText" placeholder="NEW_ID..." class="flex-1 bg-black border border-emerald-500/20 text-[10px] p-2 focus:outline-none">
                                <button onclick="addNewLabel()" class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-500 px-3">+</button>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4 italic">MARKER CONFIG</label>
                            <div class="flex items-center gap-4">
                                <input type="color" id="colorPicker" value="#ef4444" class="w-10 h-10 bg-transparent border-none cursor-pointer">
                                <input type="range" id="sizePicker" min="2" max="100" value="15" class="flex-1 accent-emerald-500">
                            </div>
                        </div>
                        
                        <button onclick="undo()" class="w-full py-3 border border-white/10 text-[9px] hover:bg-white/5 transition-all uppercase tracking-widest font-bold">
                            REVERT LAST [CTRL+Z]
                        </button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: THEATER OF OPERATIONS -->
            <div class="lg:col-span-9">
                <div class="bg-zinc-950/50 border border-emerald-500/20 p-4 preserve-3d">
                    <div class="inner-content">
                        <div class="canvas-container">
                            <canvas id="canvas" class="hidden"></canvas>
                            <div id="noImageText" class="text-center opacity-20">
                                <i class="fa-solid fa-satellite-dish text-4xl mb-6"></i>
                                <p class="text-[10px] tracking-[0.5em] uppercase">Awaiting Image...</p>
                                <p class="text-[8px] mt-2 uppercase">Upload screenshot to begin</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorInput = document.getElementById('colorPicker');
        const sizeInput = document.getElementById('sizePicker');
        const upload = document.getElementById('upload');
        const noImageText = document.getElementById('noImageText');

        let tool = 'brush', isDrawing = false, startX, startY, snapshot;
        let undoStack = [];

        // Correctly maps mouse coordinates to canvas pixels regardless of CSS scaling
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    noImageText.style.display = 'none';
                    canvas.style.display = 'block';
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    undoStack = [];
                    saveState();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function setTool(t) {
            tool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
        }

        function addNewLabel() {
            const val = document.getElementById('customText').value;
            if(val) {
                const opt = document.createElement('option');
                opt.text = val;
                document.getElementById('labelSelect').add(opt);
                document.getElementById('labelSelect').value = val;
                document.getElementById('customText').value = "";
                setTool('label');
            }
        }

        canvas.onmousedown = (e) => {
            if (undoStack.length === 0) return;
            
            const coords = getCoords(e);
            isDrawing = true;
            startX = coords.x;
            startY = coords.y;
            
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = (tool === 'eraser') ? '#000000' : colorInput.value;
            ctx.lineWidth = sizeInput.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (tool === 'label') {
                ctx.fillStyle = colorInput.value;
                ctx.font = `bold ${ctx.lineWidth * 2}px 'JetBrains Mono', monospace`;
                ctx.fillText(document.getElementById('labelSelect').value, startX, startY);
                saveState();
                isDrawing = false;
            } else {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;
            const coords = getCoords(e);

            if (tool === 'brush' || tool === 'eraser') {
                ctx.lineTo(coords.x, coords.y);
                ctx.stroke();
            } else {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                if (tool === 'rect') {
                    ctx.strokeRect(startX, startY, coords.x - startX, coords.y - startY);
                } else if (tool === 'arrow') {
                    const head = ctx.lineWidth * 2;
                    const angle = Math.atan2(coords.y - startY, coords.x - startX);
                    ctx.moveTo(startX, startY); 
                    ctx.lineTo(coords.x, coords.y);
                    ctx.lineTo(coords.x - head * Math.cos(angle - Math.PI/6), coords.y - head * Math.sin(angle - Math.PI/6));
                    ctx.moveTo(coords.x, coords.y);
                    ctx.lineTo(coords.x - head * Math.cos(angle + Math.PI/6), coords.y - head * Math.sin(angle + Math.PI/6));
                    ctx.stroke();
                }
            }
        };

        canvas.onmouseup = () => {
            if (isDrawing) {
                saveState();
                isDrawing = false;
            }
        };

        function saveState() {
            if (undoStack.length >= 25) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if (undoStack.length > 1) {
                undoStack.pop();
                ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
            }
        }

        function download() {
            if (undoStack.length === 0) return;
            const link = document.createElement('a');
            link.download = `tactical_map_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        window.onkeydown = (e) => { if (e.ctrlKey && e.key === 'z') undo(); };
    </script>
</body>
</html>
