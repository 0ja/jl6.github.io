<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL MAP | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }

        .tool-btn.active {
            color: #10b981;
            font-weight: 700;
        }

        input[type="text"], select {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid #18181b !important;
            border-radius: 0px !important;
            color: #e4e4e7 !important;
            font-size: 11px !important;
            padding: 8px 0px !important;
            transition: border-color 0.3s ease !important;
        }
        
        input:focus, select:focus {
            outline: none !important;
            border-color: #52525b !important;
        }

        input[type="file"]::file-selector-button {
            background: #18181b;
            color: #a1a1aa;
            border: 1px solid #27272a;
            padding: 6px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: #27272a;
            color: #f4f4f5;
        }

        input[type="range"] {
            accent-color: #52525b;
            background: #18181b;
        }

        canvas {
            max-width: 100%;
            height: auto !important;
            cursor: crosshair;
            display: block;
        }

        ::-webkit-scrollbar { width: 2px; height: 2px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-zinc-400 min-h-screen selection:bg-zinc-800 selection:text-white antialiased">

    <div class="max-w-[1400px] mx-auto px-8 py-20">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-24 gap-8">
            <div>
                <a href="../index.html" class="text-[10px] tracking-widest text-zinc-600 hover:text-zinc-400 transition-colors block mb-3">
                    [ back_to_index ]
                </a>
                <h1 class="text-2xl font-bold tracking-tight text-zinc-100">
                    tactical_<span class="text-zinc-500 font-normal">mapping</span>
                </h1>
            </div>

            <div class="flex flex-wrap items-center gap-8">
                <div class="flex flex-col gap-1">
                    <span class="text-[9px] text-zinc-600 uppercase tracking-widest font-bold">Source Screenshot</span>
                    <input type="file" id="upload" accept="image/*" class="text-xs text-zinc-600">
                </div>
                <button onclick="download()" class="text-[10px] text-zinc-500 hover:text-emerald-400 tracking-[0.4em] font-bold uppercase border border-zinc-900 px-6 py-3 transition-colors bg-zinc-950/20">
                    [ DOWNLOAD IMAGE ]
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-3 space-y-12">
                
                <div class="space-y-3">
                    <div class="border-b border-zinc-900 pb-2">
                        <span class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold">Tools</span>
                    </div>
                    <div class="flex flex-col space-y-1 text-left" id="toolMenu">
                        <button onclick="setTool('brush')" id="brushBtn" class="tool-btn active w-full text-left text-xs py-2 text-zinc-500 hover:text-zinc-300 transition-colors">/ brush</button>
                        <button onclick="setTool('rect')" id="rectBtn" class="tool-btn w-full text-left text-xs py-2 text-zinc-500 hover:text-zinc-300 transition-colors">/ rectangle</button>
                        <button onclick="setTool('arrow')" id="arrowBtn" class="tool-btn w-full text-left text-xs py-2 text-zinc-500 hover:text-zinc-300 transition-colors">/ vector arrow</button>
                        <button onclick="setTool('label')" id="labelBtn" class="tool-btn w-full text-left text-xs py-2 text-zinc-500 hover:text-zinc-300 transition-colors">/ alliance tag</button>
                        <button onclick="setTool('eraser')" id="eraserBtn" class="tool-btn w-full text-left text-xs py-2 text-zinc-600 hover:text-rose-400 transition-colors">/ eraser</button>
                    </div>
                </div>

                <div class="space-y-8 pt-4 border-t border-zinc-900">
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block">Alliance ID</label>
                        <select id="labelSelect" class="w-full cursor-pointer">
                            <option>HO1Y</option>
                            <option>IRON</option>
                            <option>GREY</option>
                        </select>
                        <div class="flex gap-4 pt-2">
                            <input type="text" id="customText" placeholder="add unique target id..." class="flex-1 text-xs placeholder:text-zinc-700">
                            <button onclick="addNewLabel()" class="text-zinc-500 hover:text-zinc-300 text-xs px-2 transition-colors">+</button>
                        </div>
                    </div>

                    <div class="space-y-3 pt-4 border-t border-zinc-950">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block">Marker Config</label>
                        <div class="flex items-center gap-4 py-1">
                            <input type="color" id="colorPicker" value="#ef4444" class="w-8 h-5 bg-transparent border-none cursor-pointer">
                            <input type="range" id="sizePicker" min="2" max="100" value="15" class="flex-1 h-1 bg-zinc-900 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                    
                    <button onclick="undo()" class="w-full py-2.5 border border-zinc-900 text-[10px] text-zinc-600 hover:text-zinc-400 transition-colors uppercase tracking-widest">
                        revert action [ctrl+z]
                    </button>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="space-y-4">
                    <div class="border-b border-zinc-900 pb-2">
                        <span class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold"></span>
                    </div>
                    <div class="min-h-[500px] bg-zinc-950/20 rounded border border-zinc-950 flex items-center justify-center overflow-auto p-4">
                        <canvas id="canvas" class="hidden"></canvas>
                        <div id="noImageText" class="text-center p-12 select-none">
                            <p class="text-[10px] tracking-[0.4em] text-zinc-700 uppercase font-bold">awaiting_for_image</p>
                            <p class="text-[9px] text-zinc-600 mt-2 lowercase">upload image to start working on it</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorInput = document.getElementById('colorPicker');
        const sizeInput = document.getElementById('sizePicker');
        const upload = document.getElementById('upload');
        const noImageText = document.getElementById('noImageText');

        let tool = 'brush', isDrawing = false, startX, startY, snapshot;
        let undoStack = [];

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    noImageText.style.display = 'none';
                    canvas.style.display = 'block';
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    undoStack = [];
                    saveState();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function setTool(t) {
            tool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
        }

        function addNewLabel() {
            const val = document.getElementById('customText').value.trim();
            if(val) {
                const opt = document.createElement('option');
                opt.text = val;
                document.getElementById('labelSelect').add(opt);
                document.getElementById('labelSelect').value = val;
                document.getElementById('customText').value = "";
                setTool('label');
            }
        }

        canvas.onmousedown = (e) => {
            if (undoStack.length === 0) return;
            
            const coords = getCoords(e);
            isDrawing = true;
            startX = coords.x;
            startY = coords.y;
            
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = (tool === 'eraser') ? '#0a0a0a' : colorInput.value;
            ctx.lineWidth = sizeInput.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (tool === 'label') {
                ctx.fillStyle = colorInput.value;
                ctx.font = `bold ${ctx.lineWidth * 2}px 'JetBrains Mono', monospace`;
                ctx.fillText(document.getElementById('labelSelect').value, startX, startY);
                saveState();
                isDrawing = false;
            } else {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;
            const coords = getCoords(e);

            if (tool === 'brush' || tool === 'eraser') {
                ctx.lineTo(coords.x, coords.y);
                ctx.stroke();
            } else {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                if (tool === 'rect') {
                    ctx.strokeRect(startX, startY, coords.x - startX, coords.y - startY);
                } else if (tool === 'arrow') {
                    const head = ctx.lineWidth * 2;
                    const angle = Math.atan2(coords.y - startY, coords.x - startX);
                    ctx.moveTo(startX, startY); 
                    ctx.lineTo(coords.x, coords.y);
                    ctx.lineTo(coords.x - head * Math.cos(angle - Math.PI/6), coords.y - head * Math.sin(angle - Math.PI/6));
                    ctx.moveTo(coords.x, coords.y);
                    ctx.lineTo(coords.x - head * Math.cos(angle + Math.PI/6), coords.y - head * Math.sin(angle + Math.PI/6));
                    ctx.stroke();
                }
            }
        };

        canvas.onmouseup = () => {
            if (isDrawing) {
                saveState();
                isDrawing = false;
            }
        };

        function saveState() {
            if (undoStack.length >= 25) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if (undoStack.length > 1) {
                undoStack.pop();
                ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
            }
        }

        function download() {
            if (undoStack.length === 0) return;
            const link = document.createElement('a');
            link.download = `tactical_map_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        window.onkeydown = (e) => { if (e.ctrlKey && e.key === 'z') undo(); };
    </script>
</body>
</html>
