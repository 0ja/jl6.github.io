<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDENTITY GEN | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #000;
            color: #e2e8f0;
        }

        .terminal-grid {
            background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.03;
        }

        .glass-card {
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(16, 185, 129, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(16, 185, 129, 0.4);
            background: rgba(16, 185, 129, 0.03);
        }

        .execute-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .execute-btn:hover:not(.loading) {
            background: #10b981;
            color: #000;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
        }

        .loading {
            opacity: 0.5;
            cursor: wait;
            border-color: #fbbf24 !important;
            color: #fbbf24 !important;
        }

        .value-text {
            cursor: pointer;
            word-break: break-all;
        }

        .value-text:active {
            transform: translateY(1px);
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanner::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #10b981;
            opacity: 0.2;
            animation: scanline 3s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <div class="fixed inset-0 pointer-events-none terminal-grid"></div>

    <div class="max-w-4xl mx-auto relative z-10">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 border-b border-emerald-500/10 pb-10">
            <div>
                <a href="../index.html" class="text-[10px] font-bold text-emerald-500/60 uppercase tracking-[0.4em] hover:text-emerald-400 transition-all flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-chevron-left text-[8px]"></i> BACK
                </a>
                <h1 class="text-4xl font-extrabold tracking-tighter text-emerald-400 uppercase">
                    EPU_<span class="text-white">GENERATOR</span>
                </h1>
            </div>

            <div class="mt-6 md:mt-0 flex flex-col items-end">
                <button id="generate" class="execute-btn border border-emerald-500/30 px-8 py-4 text-[10px] font-black uppercase tracking-widest bg-emerald-500/5 flex items-center gap-3">
                    <i class="fa-solid fa-sync text-[10px]"></i> GENERATE IDENTITY
                </button>
            </div>
        </header>

        <!-- MAIN INTERFACE -->
        <main class="space-y-6">
            
            <div id="output" class="grid grid-cols-1 gap-4 opacity-40 transition-opacity duration-500">
                
                <!-- USERNAME -->
                <div class="glass-card p-6 flex flex-col md:flex-row justify-between items-center gap-4 relative overflow-hidden scanner">
                    <div class="w-full md:w-auto">
                        <span class="text-[9px] font-black text-emerald-500/50 uppercase tracking-[0.3em] block mb-1">Stored Username</span>
                        <span id="val-user" class="value-text text-xl font-bold text-white tracking-tight">---</span>
                    </div>
                    <span class="text-[8px] text-slate-600 font-bold uppercase border border-white/5 px-3 py-1">Type: Alpha Numeric</span>
                </div>

                <!-- EMAIL -->
                <div class="glass-card p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="w-full md:w-auto">
                        <span class="text-[9px] font-black text-emerald-500/50 uppercase tracking-[0.3em] block mb-1">Assigned Email</span>
                        <span id="val-email" class="value-text text-xl font-bold text-white tracking-tight">---</span>
                    </div>
                    <span class="text-[8px] text-slate-600 font-bold uppercase border border-white/5 px-3 py-1">Relay: Active Burner</span>
                </div>

                <!-- PASSWORD -->
                <div class="glass-card p-6 flex flex-col md:flex-row justify-between items-center gap-4 border-l-4 border-l-emerald-500">
                    <div class="w-full md:w-auto">
                        <span class="text-[9px] font-black text-emerald-500/50 uppercase tracking-[0.3em] block mb-1">Secure Password</span>
                        <span id="val-pass" class="value-text text-xl font-bold text-emerald-400 tracking-tight">---</span>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script>
        const btn = document.getElementById('generate');
        const output = document.getElementById('output');
        const uName = document.getElementById('val-user');
        const uEmail = document.getElementById('val-email');
        const uPass = document.getElementById('val-pass');

        btn.addEventListener('click', async () => {
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-[10px]"></i> INITIALIZING...`;
            btn.classList.add('loading');
            output.classList.add('opacity-40');

            try {
                const response = await fetch('https://randomuser.me/api');
                const data = await response.json();
                const user = data.results[0];
                const username = user.login.username;
                const domain = ['proton.me', 'outlook.com', 'gmail.com', 'arc.dev'][Math.floor(Math.random() * 4)];

                uName.innerText = username;
                uEmail.innerText = `${username}@${domain}`;
                uPass.innerText = Math.random().toString(36).slice(-10).toUpperCase() + "!";

                output.classList.remove('opacity-40');
            } catch (e) {
                alert("PROTOCOL_ERROR: Uplink to Identity API failed.");
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-sync text-[10px]"></i> GENERATE_IDENTITY`;
                btn.classList.remove('loading');
            }
        });

        document.querySelectorAll('.value-text').forEach(item => {
            item.addEventListener('click', () => {
                const text = item.innerText;
                if(text === "---") return;

                navigator.clipboard.writeText(text);
                const originalText = text;
                const originalColor = item.style.color;
                
                item.innerText = "COPIED";
                item.style.color = "#fbbf24"; // System Gold
                
                setTimeout(() => {
                    item.innerText = originalText;
                    item.style.color = originalColor;
                }, 800);
            });
        });
    </script>
</body>
</html>
