<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDENTITY GEN | J_Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; }

        .loading {
            opacity: 0.5;
            cursor: wait;
            border-color: #71717a !important;
            color: #71717a !important;
        }

        .value-text {
            cursor: pointer;
            word-break: break-all;
            transition: color 0.2s ease;
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-zinc-400 min-h-screen selection:bg-zinc-800 selection:text-white antialiased">

    <div class="max-w-4xl mx-auto px-8 py-20">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-24 gap-6">
            <div>
                <a href="../index.html" class="text-[10px] tracking-widest text-zinc-600 hover:text-zinc-400 transition-colors block mb-3">
                    [ back_to_index ]
                </a>
                <h1 class="text-2xl font-bold tracking-tight text-zinc-100">
                    epu_<span class="text-zinc-500 font-normal">generator</span>
                </h1>
            </div>

            <button id="generate" class="text-[10px] text-zinc-500 hover:text-zinc-300 tracking-widest font-medium uppercase border border-zinc-900 px-8 py-4 transition-colors bg-zinc-950/20 w-full sm:w-auto">
                [ GENERATE IDENTITY ]
            </button>
        </header>

        <main class="space-y-4">
            
            <div id="output" class="divide-y divide-zinc-950 opacity-40 transition-opacity duration-300">
                
                <div class="py-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold block">Stored Username</span>
                        <span id="val-user" class="value-text text-lg font-bold text-zinc-100 tracking-tight">---</span>
                    </div>
                    <span class="text-[10px] text-zinc-600 tracking-wider font-mono">type // alphanumeric</span>
                </div>

                <div class="py-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold block">Assigned Email</span>
                        <span id="val-email" class="value-text text-lg font-bold text-zinc-100 tracking-tight">---</span>
                    </div>
                    <span class="text-[10px] text-zinc-600 tracking-wider font-mono">relay // active burner</span>
                </div>

                <div class="py-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold block">Secure Password</span>
                        <span id="val-pass" class="value-text text-lg font-bold text-emerald-400 tracking-tight">---</span>
                    </div>
                    <span class="text-[10px] text-zinc-600 tracking-wider font-mono">hash // local array</span>
                </div>

            </div>

        </main>
    </div>

    <script>
        const btn = document.getElementById('generate');
        const output = document.getElementById('output');
        const uName = document.getElementById('val-user');
        const uEmail = document.getElementById('val-email');
        const uPass = document.getElementById('val-pass');

        btn.addEventListener('click', async () => {
            btn.innerText = `[ INITIALIZING_PIPELINE... ]`;
            btn.classList.add('loading');
            output.classList.add('opacity-40');

            try {
                const response = await fetch('https://randomuser.me/api');
                const data = await response.json();
                const user = data.results[0];
                const username = user.login.username;
                const domain = ['proton.me', 'outlook.com', 'gmail.com', 'arc.dev'][Math.floor(Math.random() * 4)];

                uName.innerText = username;
                uEmail.innerText = `${username}@${domain}`;
                uPass.innerText = Math.random().toString(36).slice(-10).toUpperCase() + "!";

                output.classList.remove('opacity-40');
            } catch (e) {
                alert("PROTOCOL_ERROR: Uplink to Identity API failed.");
            } finally {
                btn.innerText = `[ GENERATE IDENTITY ]`;
                btn.classList.remove('loading');
            }
        });

        document.querySelectorAll('.value-text').forEach(item => {
            item.addEventListener('click', () => {
                const text = item.innerText;
                if(text === "---" || text === "COPIED") return;

                navigator.clipboard.writeText(text);
                const originalText = text;
                
                item.innerText = "COPIED";
                item.className = "value-text text-lg font-bold text-zinc-500 tracking-tight";
                
                setTimeout(() => {
                    item.innerText = originalText;
                    if (item.id === 'val-pass') {
                        item.className = "value-text text-lg font-bold text-emerald-400 tracking-tight";
                    } else {
                        item.className = "value-text text-lg font-bold text-zinc-100 tracking-tight";
                    }
                }, 800);
            });
        });
    </script>
</body>
</html>
